<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
</head>
<body>

<h1>Dashboard_Free</h1>
<div class="header">
    <button class="logout-btn" onclick="logout()">Logout</button>
    <br>
</div>

<button onclick="getFeatures()">View Features</button>
<button id="createProjectBtn" onclick="openForm()">Create Project</button>

<!-- 🔹 Project Form Modal -->
<div id="projectForm" style="display:none; position:fixed; top:30%; left:40%; background:white; padding:20px; box-shadow:0 0 10px gray;">
    <h3>Create Project</h3>
    <input id="projectName" placeholder="Project Name" style="display:block; margin-bottom:10px;" />
    <button onclick="submitProject()">Submit</button>
    <button onclick="closeForm()">Cancel</button>
</div>

<h2>Plan Details</h2>
<div id="planInfo"></div>

<h2>Projects</h2>
<table id="projectsTable" border="1" style="border-collapse: collapse; width: 50%;">
    <thead style="background-color: #4CAF50; color: white;">
        <tr>
            <th>#</th>
            <th>Project</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<!-- 🔹 Subscription Modal -->
<div id="subscriptionModal" style="display:none; position:fixed; top:30%; left:40%; background:white; padding:20px; box-shadow:0 0 10px gray;">
    <h3>Upgrade to Pro</h3>
    <p>💰 Amount: <b>₹500</b></p>
    <input type="file" id="paymentProof" accept="application/pdf"><br><br>
    <button onclick="submitSubscription()">Submit</button>
    <button onclick="closeSubscriptionForm()">Cancel</button>
</div>

<style>
    table {
        font-family: Arial, sans-serif;
        border-radius: 8px;
        overflow: hidden;
        box-shadow: 0 4px 8px rgba(237, 11, 11, 0.1);
    }
    th {
        background: linear-gradient(to right, #4CAF50, #2e7d32);
        color: white;
    }
    tr:hover {
        background-color: #f1f1f1;
        transition: 0.2s;
    }
</style>

<script>
function logout() {
    localStorage.removeItem("token");
    window.location.href = "/"; 
}

let userPlan = null; // store plan info
let projects = [];

window.onload = async () => {
    await getFeatures();
    loadProjects();
};

// 🔹 Fetch Plan and Features
async function getFeatures() {
    const token = localStorage.getItem("token");
    const res = await fetch('/api/features', {
        method: "GET",
        headers: { Authorization: "Bearer " + token },
        credentials: "include"
    });

    let data;
    try { data = await res.json(); } 
    catch { alert("❌ Server error"); return; }

    if (!res.ok) { alert(data.msg || "Error"); return; }

    userPlan = data.plan; // store plan globally

    document.getElementById("dashboardTitle").innerText = "Dashboard_" + userPlan.name;

    document.getElementById("planInfo").innerHTML = `
        <p><b>Plan Name:</b> ${userPlan.name}</p>
        <p><b>Max Usage:</b> ${userPlan.max_usage}</p>
        <p><b>Features:</b> ${data.features.join(", ")}</p>
        ${userPlan.name === "Free" ? `<button onclick="openSubscriptionForm()">🚀 Upgrade to PRO</button>` : ""}
    `;
}

// 🔹 Load Projects
async function loadProjects() {
    const token = localStorage.getItem("token");
    try {
        const res = await fetch('/api/projects', {
            method: "GET",
            headers: { Authorization: "Bearer " + token },
            credentials: "include"
        });
        projects = await res.json();

        const tbody = document.querySelector("#projectsTable tbody");
        tbody.innerHTML = "";
        projects.forEach((p, index) => {
            tbody.innerHTML += `
                <tr>
                    <td>${index + 1}</td>
                    <td>${p.name}</td>
                    <td>
                        <button onclick="renameProject(${p.id}, '${p.name}')">✏️</button>
                        <button onclick="deleteProject(${p.id})">❌</button>
                    </td>
                </tr>
            `;
        });

        // Disable project creation if Free plan limit reached
        if (userPlan && userPlan.name === "Free" && projects.length >= userPlan.max_usage) {
            document.getElementById("createProjectBtn").disabled = true;
        }

    } catch (err) {
        console.error(err);
        alert("Server unreachable");
    }
}

// 🔹 Create Project
async function submitProject() {
    const name = document.getElementById("projectName").value;
    if (!name) { alert("Enter project name"); return; }

    // Check Free plan limit
    if (userPlan.name === "Free" && projects.length >= userPlan.max_usage) {
        alert("Free plan limit reached. Upgrade to PRO.");
        return;
    }

    const token = localStorage.getItem("token");
    try {
        const res = await fetch('/api/create_project', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', Authorization: "Bearer " + token },
            credentials: "include",
            body: JSON.stringify({ name })
        });
        const data = await res.json();
        if (!res.ok) { alert(data.msg || "Error"); return; }

        alert("✅ " + data.msg);
        closeForm();
        document.getElementById("projectName").value = "";
        loadProjects();
    } catch (err) {
        console.error(err);
        alert("Server error");
    }
}

// 🔹 Delete Project
async function deleteProject(id) {
    if (!confirm("Delete this project?")) return;
    const token = localStorage.getItem("token");
    try {
        const res = await fetch(`/api/delete_project/${id}`, {
            method: "DELETE",
            headers: { Authorization: 'Bearer ' + token },
            credentials: "include"
        });
        const data = await res.json();
        if (!res.ok) { alert(data.msg); return; }

        alert("🗑 " + data.msg);
        loadProjects();
    } catch (err) { console.error(err); alert("Server error"); }
}

// 🔹 Rename Project
async function renameProject(id, oldName) {
    const newName = prompt("Enter new name:", oldName);
    if (!newName || newName === oldName) return;
    const token = localStorage.getItem("token");
    try {
        const res = await fetch(`/api/update_project/${id}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json", Authorization: "Bearer " + token },
            credentials: "include",
            body: JSON.stringify({ name: newName })
        });
        const data = await res.json();
        if (!res.ok) { alert(data.msg); return; }

        alert("✏️ " + data.msg);
        loadProjects();
    } catch (err) { console.error(err); alert("Server error"); }
}

// 🔹 Modals
function openForm() { document.getElementById("projectForm").style.display = "block"; }
function closeForm() { document.getElementById("projectForm").style.display = "none"; }

function openSubscriptionForm() { document.getElementById("subscriptionModal").style.display = "block"; }
function closeSubscriptionForm() { document.getElementById("subscriptionModal").style.display = "none"; }

// 🔹 Upgrade to PRO
async function submitSubscription() {
    const file = document.getElementById("paymentProof").files[0];
    if (!file) { 
        alert("Upload PDF"); 
        return; 
    }
    const token = localStorage.getItem("token");
    const formData = new FormData();
    formData.append("amount", 500);
    formData.append("file", file);
    try {
        const res = await fetch('/api/subscribe', {
            method: "POST",
            headers: { Authorization: "Bearer " + token },
            credentials: "include",
            body: formData
        });
        const data = await res.json();
        if (!res.ok) { 
            alert(data.msg || "Subscription failed"); 
            return; 
        }
        alert("🚀 " + data.msg);
        window.location.href = "/dashboard2";
    } catch (err) { 
        console.error(err); 
        alert("Server error"); 
    }
}
</script>
</body>
</html>
