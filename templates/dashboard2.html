<!DOCTYPE html>
<html>
<head>
    <title>Dashboard_pro</title>
</head>
<body>

<h1>Dashboard_Pro</h1>
<div class="header">
    <button class="logout-btn" onclick="logout()">Logout</button>
    <br>
</div>

<button onclick="getFeatures()">View Features</button>
<button onclick="openForm()">Create Project</button>

<!-- 🔹 Project Form Modal -->
<div id="projectForm" style="display:none; position:fixed; top:30%; left:40%; background:white; padding:20px; box-shadow:0 0 10px gray;">
    <h3>Create Project</h3>
    <input id="projectName" placeholder="Project Name" style="display:block; margin-bottom:10px;" />
    <button onclick="submitProject()">Submit</button>
    <button onclick="closeForm()">Cancel</button>
</div>


<h2>Plan Details</h2>
<div id="planInfo"></div>

<h2>Projects</h2> 
<table id="projectsTable" border="1" style="border-collapse: collapse; width: 50%;"> 
    <thead style="background-color: #4CAF50; color: white;"> 
        <tr> 
            <th>#</th> 
            <th>Project</th>
            <th>Action</th>
        </tr> 
    </thead> 
    <tbody></tbody> 
</table>

<pre id="output"></pre>

<style>
    #projectForm {
        display: none;
        position: fixed;
        top: 30%;
        left: 40%;
        background: white;
        padding: 20px;
        box-shadow: 0 0 10px gray;
    }
    #projectForm.show {
        display: block;
    }
    table {
        font-family: Arial, sans-serif;
        border-radius: 8px;
        overflow: hidden;
        box-shadow: 0 4px 8px rgba(237, 11, 11, 0.1);
    }
    th {
        background: linear-gradient(to right, #4CAF50, #2e7d32);
        color: white;
    }
    tr:hover {
        background-color: #f1f1f1;
        transition: 0.2s;
    }
</style>

<script>
function logout() {
    localStorage.removeItem("token");
    window.location.href = "/"; 
}

window.onload = async () => {
    await getFeatures(); 
    loadProjects();
}
const token = localStorage.getItem("token");
    
// 🔹 Get Features
async function getFeatures() {
    const token = localStorage.getItem("token");
    const res = await fetch('/api/features', { 
        method: "GET",
        headers: {
            "Authorization": "Bearer " + token
        },
        credentials: "include"
    });
    let text = await res.text();
    let data;
    try {
        data = JSON.parse(text);
    } catch {
        alert("❌ Server error (not JSON)");
        console.error(text);
        return;
    }
    if (!res.ok) {
        alert(data.msg || "Error");
        return;
    }
    document.getElementById("planInfo").innerHTML = `
        <p><b>Plan Name:</b> ${data.plan.name}</p>
        <p><b>Max Usage:</b> ${data.plan.max_usage}</p>
        <p><b>Features:</b> ${data.features.join(", ")}</p>
    `;
}
    
//Load Project
async function loadProjects() {
    const token = localStorage.getItem("token");
    if (!token) {
        alert("Please login first");
        window.location.href = "/";
        return;
    }
    try {
        const res = await fetch('/api/projects', {
            method: "GET",
            headers: {
                "Authorization": "Bearer " + token
            },
            credentials: "include"
        });
        const text = await res.text();
        let projects;
        try {
            projects = JSON.parse(text);
        } catch {
            alert("❌ Server error loading projects");
            console.error(text);
            return;
        }
        if (!res.ok) {
            alert(projects.msg || "Error loading projects");
            return;
        }
        const tbody = document.querySelector("#projectsTable tbody");
        tbody.innerHTML = "";
        projects.forEach((p, index) => {
            tbody.innerHTML += `
                <tr>
                    <td>${index + 1}</td>
                    <td>${p.name}</td>
                    <td>
                        <button onclick="renameProject(${p.id}, '${p.name}')">✏️</button>
                        <button onclick="deleteProject(${p.id})">❌</button>
                    </td>
                </tr>
            `;
        });
    } catch (err) {
        console.error(err);
        alert("Server unreachable");
    }
}
    
// 🔹 Create Project
async function submitProject() {
    const name = document.getElementById("projectName").value;
    if (!name) {
        alert("Enter project name");
        return;
    }
    const token = localStorage.getItem("token");
    try {
        const res = await fetch('/api/create_project', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                Authorization: "Bearer " + token
            },
            credentials: "include",
            body: JSON.stringify({ name })
        });
        const data = await res.json();
        if (res.status === 403) {
            alert("🚫 " + data.msg);
            return;
        }
        if (!res.ok) {
            alert(data.msg || "Error");
            return;
        }
        alert("✅ " + data.msg);
        closeForm();
        document.getElementById("projectName").value = "";
        loadProjects();
    } catch (err) {
        console.error(err);
        alert("Server error");
    }
}

// 🔹 Delete
async function deleteProject(id) {
    if (!confirm("Delete this project?")) return;
    const token = localStorage.getItem("token");
    try {
        const res = await fetch(`/api/delete_project/${id}`, {
            method: "DELETE",
            headers: {
                'Authorization': 'Bearer ' + token
            },
            credentials: "include"
        });
        const data = await res.json();
        if (!res.ok) {
            alert(data.msg);
            return;
        }
        alert("🗑 " + data.msg);
        loadProjects();
    } catch (err) {
        console.error(err);
        alert("Server error");
    }
}

// 🔹 Rename
async function renameProject(id, oldName) {
    const newName = prompt("Enter new name:", oldName);
    if (!newName || newName === oldName) return;
    const token = localStorage.getItem("token");
    try {
        const res = await fetch(`/api/update_project/${id}`, {
            method: "PUT",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + token
            },
            credentials: "include",
            body: JSON.stringify({ name: newName })
        });
        const data = await res.json();
        if (!res.ok) {
            alert(data.msg);
            return;
        }
        alert("✏️ " + data.msg);
        loadProjects();
    } catch (err) {
        console.error(err);
        alert("Server error");
    }
}

// 🔹 UI Controls
function openForm() {
    console.log("clicked");
    document.getElementById("projectForm").style.display = "block";
}

function closeForm() {
    document.getElementById("projectForm").style.display = "none";
}
</script>
</body>
</html>
