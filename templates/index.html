<!DOCTYPE html>
<html>
<head>
    <title>SaaS</title>
    <style>
        /* Your existing gradient & card styles */
        body { margin:0; font-family:'Segoe UI', sans-serif; display:flex; justify-content:center; align-items:center; height:100vh; background: linear-gradient(-45deg,#1e3c72,#2a5298,#00c6ff,#0072ff); background-size:400% 400%; animation: gradientBG 10s ease infinite; }
        @keyframes gradientBG {0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
        .card{width:360px;backdrop-filter:blur(15px);background:rgba(255,255,255,0.1);border-radius:16px;padding:25px;color:white;box-shadow:0 10px 30px rgba(0,0,0,0.3);}
        h2{text-align:center} input{width:100%;padding:10px;border-radius:8px;border:none;outline:none;margin:10px 0;} button{width:100%;padding:10px;border:none;border-radius:8px;background:#00c6ff;color:white;font-weight:bold;cursor:pointer;transition:.3s;} button:hover{background:#0072ff} .hidden{display:none;} .switch{text-align:center;margin-top:10px;cursor:pointer;font-size:14px;color:#ddd;} #toast{position:fixed;bottom:20px;right:20px;background:black;color:white;padding:12px 20px;border-radius:8px;display:none;}
    </style>
</head>
<body>
<button id="logoutBtn" onclick="logout()" style="position:absolute; top:20px; right:20px;">Logout</button>
<script>
<div class="card">
    <div id="loginBox">
        <h2>Login</h2>
        <input id="login_username" placeholder="Username">
        <input id="login_password" type="password" placeholder="Password">
        <button onclick="login()">Login</button>
        <div class="switch" onclick="showRegister()">Create account →</div>
    </div>
    <div id="registerBox" class="hidden">
        <h2>Register</h2>
        <input id="reg_username" placeholder="Username">
        <input id="reg_password" type="password" placeholder="Password">
        <input id="reg_tenant" placeholder="Tenant ID">
        <button onclick="register()">Register</button>
        <div class="switch" onclick="showLogin()">← Back to login</div>
    </div>
</div>
<div id="toast"></div>

<script>
const BASE_URL = window.location.origin; // works for local & deployed

function showToast(msg){
    const toast = document.getElementById("toast");
    toast.innerText = msg;
    toast.style.display="block";
    setTimeout(()=>toast.style.display="none",2000);
}

function showRegister(){ document.getElementById("loginBox").classList.add("hidden"); document.getElementById("registerBox").classList.remove("hidden"); }
function showLogin(){ document.getElementById("registerBox").classList.add("hidden"); document.getElementById("loginBox").classList.remove("hidden"); }

async function register(){
    const username=document.getElementById("reg_username").value;
    const password=document.getElementById("reg_password").value;
    const tenant=document.getElementById("reg_tenant").value;
    if(!username||!password||!tenant){ showToast("Fill all fields"); return; }
    try{
        const res=await fetch(`${BASE_URL}/api/register`,{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({username,password,tenant_id:tenant}),
            credentials:"include"
        });
        const data=await res.json().catch(()=>({}));
        if(!res.ok){ showToast(data.error||"Registration failed"); return; }
        showToast(data.msg);
        setTimeout(showLogin,1000);
    }catch(err){ console.error(err); showToast("Server unreachable"); }
}

async function login(){
    const username=document.getElementById("login_username").value;
    const password=document.getElementById("login_password").value;
    if(!username||!password){ showToast("Enter credentials"); return; }
    try{
        const res=await fetch(`${BASE_URL}/api/login`,{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({username,password}),
            credentials:"include"
        });
        const data=await res.json().catch(()=>({}));
        if(!res.ok){ showToast(data.error||"Login failed"); return; }
        showToast(data.msg);
        setTimeout(()=>window.location.href="/dashboard",1000);
    }catch(err){ console.error(err); showToast("Server unreachable"); }
}
async function logout(){
    try {
        const res = await fetch(`${BASE_URL}/api/logout`, {
            method: "POST",
            credentials: "include"
        });
        if(res.ok){
            showToast("Logged out ✅");
            setTimeout(()=> window.location.href = "/", 1000);
        }
    } catch(err){
        console.error(err);
        showToast("Logout failed");
    }
}

// Wrapper function to fetch protected data with auto-redirect
async function fetchWithAuth(url, options = {}){
    options.credentials = "include"; // send cookies
    try {
        const res = await fetch(url, options);
        if(res.status === 401){
            // JWT expired or invalid
            showToast("Session expired. Redirecting to login...");
            setTimeout(()=> window.location.href = "/", 1500);
            return null;
        }
        return await res.json();
    } catch(err){
        console.error(err);
        showToast("Server unreachable");
        return null;
    }
}

// Example usage: fetch usage or dashboard data
async function loadDashboard(){
    const data = await fetchWithAuth(`${BASE_URL}/dashboard`);
    if(data){
        console.log(data);
    }
}
</script>
</body>
</html>
